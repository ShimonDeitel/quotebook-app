name: Quotebook
options:
  bundleIdPrefix: com.shimondeitel.quotelog
  deploymentTarget:
    iOS: "17.0"
  createIntermediateGroups: true
  groupSortPosition: top
settings:
  base:
    MARKETING_VERSION: "1.0"
    CURRENT_PROJECT_VERSION: "1"
    SWIFT_VERSION: "5.0"
    DEVELOPMENT_TEAM: "W7Q885Q59C"
    CODE_SIGN_STYLE: Automatic
    IPHONEOS_DEPLOYMENT_TARGET: "17.0"
    TARGETED_DEVICE_FAMILY: "1"
    ENABLE_USER_SCRIPT_SANDBOXING: "YES"
targets:
  Quotebook:
    type: application
    platform: iOS
    sources:
      - path: Quotebook
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.shimondeitel.quotelog
        TARGETED_DEVICE_FAMILY: "1"
        INFOPLIST_FILE: Quotebook/Info.plist
        ASSETCATALOG_COMPILER_APPICON_NAME: AppIcon
        ASSETCATALOG_COMPILER_GLOBAL_ACCENT_COLOR_NAME: AccentColor
        ENABLE_PREVIEWS: "YES"
        GENERATE_INFOPLIST_FILE: "NO"
  QuotebookTests:
    type: bundle.unit-test
    platform: iOS
    sources:
      - path: QuotebookTests
      - path: Quotebook.storekit
    dependencies:
      - target: Quotebook
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.shimondeitel.quotelog.tests
        GENERATE_INFOPLIST_FILE: "YES"
        TARGETED_DEVICE_FAMILY: "1"
  QuotebookUITests:
    type: bundle.ui-testing
    platform: iOS
    sources:
      - path: QuotebookUITests
    dependencies:
      - target: Quotebook
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.shimondeitel.quotelog.uitests
        GENERATE_INFOPLIST_FILE: "YES"
        TARGETED_DEVICE_FAMILY: "1"
schemes:
  Quotebook:
    build:
      targets:
        Quotebook: all
        QuotebookTests: [test]
        QuotebookUITests: [test]
    run:
      config: Debug
      storeKitConfiguration: Quotebook.storekit
    test:
      config: Debug
      storeKitConfiguration: Quotebook.storekit
      targets:
        - QuotebookTests
        - QuotebookUITests
    archive:
      config: Release
